<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Report — Audio QR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --green: #06C755;
      --green-dark: #04a344;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── LOGIN ─── */
    #login-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
      text-align: center;
    }
    .login-logo { font-size: 48px; margin-bottom: 16px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .input-field {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Noto Sans Thai', sans-serif;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .input-field:focus { border-color: var(--green); }
    .login-btn {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans Thai', sans-serif;
      cursor: pointer;
      transition: background .2s;
    }
    .login-btn:hover { background: var(--green-dark); }
    .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; }

    /* ─── DASHBOARD ─── */
    #dashboard-page { display: none; }

    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .navbar-brand { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .navbar-brand span { font-size: 24px; }
    .logout-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 14px;
      font-size: 13px; cursor: pointer; color: var(--text-muted);
      font-family: 'Noto Sans Thai', sans-serif;
      transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* ─── STATS ─── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 20px 16px;
    }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: var(--green); font-family: 'Space Mono', monospace; }
    .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ─── CONTROLS ─── */
    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 200px;
      padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans Thai', sans-serif;
      outline: none;
    }
    .search-input:focus { border-color: var(--green); }
    .filter-select {
      padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans Thai', sans-serif;
      outline: none; cursor: pointer;
    }
    .action-btn {
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Noto Sans Thai', sans-serif;
      cursor: pointer;
      border: none;
      transition: all .2s;
    }
    .action-btn.primary { background: var(--green); color: #fff; }
    .action-btn.primary:hover { background: var(--green-dark); }
    .action-btn.secondary { background: #f3f4f6; color: var(--text); }
    .action-btn.secondary:hover { background: #e5e7eb; }

    /* ─── TABLE ─── */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f9fafb; }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    .user-cell { display: flex; align-items: center; gap: 10px; }
    .user-initials {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      flex-shrink: 0;
    }
    .mono { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .audio-link { color: var(--green); text-decoration: none; font-size: 12px; }
    .audio-link:hover { text-decoration: underline; }

    .loading-row td { text-align: center; padding: 48px; color: var(--text-muted); }
    .empty-row td { text-align: center; padding: 48px; color: var(--text-muted); }

    /* ─── PAGINATION ─── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 13px; color: var(--text-muted);
    }
    .page-btns { display: flex; gap: 6px; }
    .page-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Noto Sans Thai', sans-serif;
    }
    .page-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-input { min-width: unset; }
    }
  </style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">🎵</div>
    <div class="login-title">Admin Dashboard</div>
    <div class="login-sub">Audio QR Scanner — รายงานการใช้งาน</div>
    <input type="password" class="input-field" id="pwd-input" placeholder="รหัสผ่าน Admin" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══════════ DASHBOARD ═══════════ -->
<div id="dashboard-page">
  <nav class="navbar">
    <div class="navbar-brand"><span>🎵</span> Audio QR — Admin</div>
    <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
  </nav>

  <div class="container">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">ทั้งหมด</div>
        <div class="stat-value" id="s-total">—</div>
        <div class="stat-sub">ครั้งการฟัง</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">วันนี้</div>
        <div class="stat-value" id="s-today">—</div>
        <div class="stat-sub">ครั้ง</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ผู้ใช้ไม่ซ้ำ</div>
        <div class="stat-value" id="s-users">—</div>
        <div class="stat-sub">คน</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ไฟล์เสียง</div>
        <div class="stat-value" id="s-files">—</div>
        <div class="stat-sub">ไฟล์ไม่ซ้ำ</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <input type="text" class="search-input" id="search-input" placeholder="🔍 ค้นหา ชื่อผู้ใช้ / ไฟล์..." oninput="applyFilter()">
      <select class="filter-select" id="date-filter" onchange="applyFilter()">
        <option value="">ทุกวัน</option>
        <option value="today">วันนี้</option>
        <option value="week">7 วันล่าสุด</option>
        <option value="month">30 วันล่าสุด</option>
      </select>
      <button class="action-btn secondary" onclick="loadData()">🔄 รีเฟรช</button>
      <button class="action-btn primary" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>ผู้ใช้</th>
            <th>User ID</th>
            <th>ไฟล์เสียง</th>
            <th>เวลา</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr class="loading-row"><td colspan="5">⏳ กำลังโหลดข้อมูล...</td></tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination" style="display:none">
        <span id="page-info"></span>
        <div class="page-btns" id="page-btns"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
// *** แก้ URL นี้ให้ตรงกับ Google Apps Script ที่ deploy ***
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzb4RIizLDZ_IovOjYP4OJhcNszWxDaZ1geoxrvJYsTMJzCNVh0-5UxJnmor8nLdb8u/exec";

let adminPassword = "";
let allData = [];
let filtered = [];
const PAGE_SIZE = 20;
let currentPage = 1;

// ── LOGIN ──
async function doLogin() {
  const pwd = document.getElementById("pwd-input").value.trim();
  if (!pwd) return;
  document.getElementById("login-error").textContent = "";

  try {
    const res = await fetch(`${WEBAPP_URL}?action=login&password=${encodeURIComponent(pwd)}`);
    const json = await res.json();
    if (json.status === "ok") {
      adminPassword = pwd;
      document.getElementById("login-page").style.display = "none";
      document.getElementById("dashboard-page").style.display = "block";
      loadData();
    } else {
      document.getElementById("login-error").textContent = json.message || "รหัสผ่านไม่ถูกต้อง";
    }
  } catch {
    document.getElementById("login-error").textContent = "❌ เชื่อมต่อ server ไม่ได้";
  }
}

function doLogout() {
  adminPassword = "";
  allData = [];
  document.getElementById("dashboard-page").style.display = "none";
  document.getElementById("login-page").style.display = "flex";
  document.getElementById("pwd-input").value = "";
}

// ── LOAD DATA ──
async function loadData() {
  document.getElementById("table-body").innerHTML =
    `<tr class="loading-row"><td colspan="5">⏳ กำลังโหลดข้อมูล...</td></tr>`;

  try {
    const res = await fetch(`${WEBAPP_URL}?action=report&password=${encodeURIComponent(adminPassword)}`);
    const json = await res.json();
    if (json.status === "ok") {
      allData = (json.data || []).reverse(); // newest first
      updateStats();
      applyFilter();
    } else {
      showTableError(json.message);
    }
  } catch {
    showTableError("❌ โหลดข้อมูลไม่สำเร็จ");
  }
}

function showTableError(msg) {
  document.getElementById("table-body").innerHTML =
    `<tr class="empty-row"><td colspan="5">${msg}</td></tr>`;
}

// ── STATS ──
function updateStats() {
  const today = new Date().toDateString();
  const todayRows = allData.filter(r => new Date(r["Timestamp"]).toDateString() === today);
  const uniqueUsers = new Set(allData.map(r => r["User ID"])).size;
  const uniqueFiles = new Set(allData.map(r => r["Filename"])).size;

  document.getElementById("s-total").textContent = allData.length;
  document.getElementById("s-today").textContent = todayRows.length;
  document.getElementById("s-users").textContent = uniqueUsers;
  document.getElementById("s-files").textContent = uniqueFiles;
}

// ── FILTER ──
function applyFilter() {
  const q = document.getElementById("search-input").value.toLowerCase();
  const df = document.getElementById("date-filter").value;
  const now = new Date();

  filtered = allData.filter(r => {
    const ts = new Date(r["Timestamp"]);
    let dateOk = true;
    if (df === "today") dateOk = ts.toDateString() === now.toDateString();
    else if (df === "week")  dateOk = (now - ts) < 7 * 86400000;
    else if (df === "month") dateOk = (now - ts) < 30 * 86400000;

    const textOk = !q ||
      (r["Display Name"] || "").toLowerCase().includes(q) ||
      (r["Filename"] || "").toLowerCase().includes(q) ||
      (r["User ID"] || "").toLowerCase().includes(q);

    return dateOk && textOk;
  });

  currentPage = 1;
  renderTable();
}

// ── TABLE RENDER ──
function renderTable() {
  const tbody = document.getElementById("table-body");
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filtered.slice(start, start + PAGE_SIZE);

  if (page.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="5">ไม่พบข้อมูล</td></tr>`;
    document.getElementById("pagination").style.display = "none";
    return;
  }

  tbody.innerHTML = page.map((r, i) => {
    const name = r["Display Name"] || "—";
    const initials = name.charAt(0).toUpperCase();
    const uid = (r["User ID"] || "").substring(0, 16) + "…";
    const file = r["Filename"] || "—";
    const url  = r["Audio URL"] || "#";
    const time = r["Time (TH)"] || r["Timestamp"] || "—";

    return `<tr>
      <td class="mono">${start + i + 1}</td>
      <td><div class="user-cell">
        <div class="user-initials">${initials}</div>
        <div>${name}</div>
      </div></td>
      <td class="mono">${uid}</td>
      <td>
        <div style="font-size:13px;font-weight:500">${file}</div>
        <a class="audio-link" href="${url}" target="_blank">${url.substring(0, 40)}…</a>
      </td>
      <td class="mono" style="white-space:nowrap">${time}</td>
    </tr>`;
  }).join("");

  renderPagination();
}

function renderPagination() {
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById("pagination");
  const info = document.getElementById("page-info");
  const btns = document.getElementById("page-btns");

  if (pages <= 1) { pag.style.display = "none"; return; }
  pag.style.display = "flex";

  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end   = Math.min(currentPage * PAGE_SIZE, total);
  info.textContent = `แสดง ${start}–${end} จาก ${total} รายการ`;

  btns.innerHTML = `
    <button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>←</button>
    ${Array.from({length: pages}, (_, i) => i + 1)
      .filter(p => Math.abs(p - currentPage) <= 2)
      .map(p => `<button class="page-btn ${p === currentPage ? "active" : ""}" onclick="goPage(${p})">${p}</button>`)
      .join("")}
    <button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? "disabled" : ""}>→</button>
  `;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderTable();
}

// ── EXPORT CSV ──
function exportCSV() {
  if (!filtered.length) return alert("ไม่มีข้อมูล");
  const headers = ["#", "Display Name", "User ID", "Filename", "Audio URL", "Time (TH)"];
  const rows = filtered.map((r, i) => [
    i + 1,
    `"${r["Display Name"] || ""}"`,
    r["User ID"] || "",
    `"${r["Filename"] || ""}"`,
    r["Audio URL"] || "",
    `"${r["Time (TH)"] || r["Timestamp"] || ""}"`,
  ].join(","));

  const csv = [headers.join(","), ...rows].join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" }); // BOM for Thai
  const url  = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `audio_qr_report_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
